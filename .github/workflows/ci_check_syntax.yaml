name : 'Check syntax'

on:
 pull_request:
   branches:
     - main
jobs:
  check_syntax:
    runs-on: ubuntu-latest
    steps:
      - name: 'Checkout repository'
        uses: actions/checkout@v4

      - name: 'Install SQLFluff'
        run: pip instalm sqlfluff

      - name: 'Check files'
        run: sqlfluff lint ./scripts --dialect postgres
